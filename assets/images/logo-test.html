<!DOCTYPE html>
<html>
<body style="background:#111; display:flex; align-items:center; justify-content:center; height:100vh;">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="400">
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ddd"/>
      <stop offset="38%" stop-color="#d7dbe3"/>
      <stop offset="72%" stop-color="#9ea5b2"/>
      <stop offset="100%" stop-color="#666666"/>
    </linearGradient>

    <!-- white = keep visible, black = hide -->
    <mask id="ringClearanceMask" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="512" height="512" fill="white"/>

      <!-- same transformed ring path, but thicker to create clearance -->
      <g transform="translate(-18,-20) rotate(5, 256, 256)">
        <path d="M 347 165
                 A 34 190 45 1,1 165 347
                 L 172 352
                 A 24 160 45 1,0 356 172
                 Z"
              fill="black"
              stroke="black"
              stroke-width="10"
              stroke-linejoin="round"/>
      </g>
    </mask>
  </defs>
<g transform="translate(-77,-90) scale(1.3,1.3)">
  <!-- everything that should NOT show near the rotated ring -->
  <g mask="url(#ringClearanceMask)">
    <circle cx="256" cy="256" r="118"
            fill="none"
            stroke="url(#metal)"
            stroke-width="12"/>

    <circle cx="256" cy="256" r="92"
            fill="none"
            stroke="#f0f2f6"
            stroke-width="5"
            stroke-linecap="round"
            stroke-dasharray="1.5 10.5"/>

    <path d="M 348 256 A 92 92 0 0 1 256 348"
          fill="none"
          stroke="url(#metal)"
          stroke-width="5"
          stroke-linecap="round"/>
  </g>

  <!-- actual rotated ring drawn cleanly on top -->
  <g transform="translate(-18,-20) rotate(5, 256, 256)">
    <path d="M 347 165
             A 34 190 45 1,1 165 347
             L 172 352
             A 24 160 45 1,0 356 172
             Z"
          fill="url(#metal)"
          stroke="url(#metal)"
          stroke-width="0"/>
  </g>
<g transform="translate(-50,60) scale(1.2,0.75)">
    <text x="256" y="274"
      text-anchor="middle"
      font-family="Orbitron, Rajdhani, Exo 2, sans-serif"
      font-size="42"
      letter-spacing="3"
      fill="white"
    stroke="white"
stroke-width="8.5"
paint-order="stroke fill">      
  PARALLAX-NU
</text>
  <text x="256" y="274"
      text-anchor="middle"
      font-family="Orbitron, Rajdhani, Exo 2, sans-serif"
      font-size="42"
      letter-spacing="3"
      fill="black"
    stroke="white"
stroke-width="0.5"
paint-order="stroke fill">
  PARALLAX-NU
</text>
  </g>
  </g>
</svg>

</body>
</html>
